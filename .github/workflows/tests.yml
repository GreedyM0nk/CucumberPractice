name: Retail Automation CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Permissions required for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Run all tests - this generates both JUnit XML and Allure JSON results
      - name: Run All Tests
        run: mvn clean test -Denv=uat -Dtest=SmokeTestRunner
        continue-on-error: true
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      # Verify test execution results
      - name: Check Test Results
        if: always()
        run: |
          echo "=== Test Results Check ==="
          echo ""
          echo "Checking for test result files..."
          
          RESULT_COUNT=$(find target/allure-results -name "*.json" 2>/dev/null | wc -l)
          echo "✓ Found $RESULT_COUNT Allure result files"
          
          if [ -d target/surefire-reports ]; then
            SUREFIRE_COUNT=$(find target/surefire-reports -name "*.xml" 2>/dev/null | wc -l)
            echo "✓ Found $SUREFIRE_COUNT Surefire XML reports"
          fi
          
          echo ""
          ls -la target/allure-results | head -20 || echo "No allure-results directory"
          echo ""

      # Download historical Allure reports for trend analysis
      - name: Download Previous Report History
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: allure-report-history
          sparse-checkout: 'history'

      # Generate Allure HTML report from JSON results
      - name: Generate Allure Report
        if: always()
        run: |
          set +e
          echo "Generating Allure report..."
          
          # Run Allure report generation
          mvn allure:report \
              -Dallure.results.directory=target/allure-results \
              -q
          
          if [ -f "target/site/allure-report/index.html" ]; then
              echo "✓ Allure report generated successfully"
          else
              echo "⚠ Creating minimal report structure..."
              mkdir -p target/site/allure-report
          fi

      # Integrate historical data for trend charts
      - name: Integrate Report History
        if: always()
        run: |
          mkdir -p target/site/allure-report/history
          
          # Copy previous history if it exists
          if [ -d "allure-report-history/history" ]; then
              echo "Integrating historical data..."
              cp -r allure-report-history/history/* target/site/allure-report/history/ 2>/dev/null || true
              ls -la target/site/allure-report/history/
          fi

      # Publish the report to GitHub Pages
      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/site/allure-report
          force_orphan: false
          retention_days: 30

      # Post-deployment verification and summary
      - name: Report Generation Summary
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "Test Execution & Report Generation Summary"
          echo "=========================================="
          echo ""
          
          if [ -f "target/site/allure-report/index.html" ]; then
              echo "✓ Allure Report: GENERATED ✓"
              echo ""
              REPO_OWNER=$(echo '${{ github.repository }}' | cut -d/ -f1)
              REPO_NAME=$(echo '${{ github.repository }}' | cut -d/ -f2)
              echo "📊 View Report: https://${REPO_OWNER}.github.io/${REPO_NAME}/"
              echo ""
          else
              echo "⚠ Allure Report: NOT GENERATED"
              echo "  Check logs above for details"
          fi
          
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Timestamp: $(date)"
          echo "=========================================="