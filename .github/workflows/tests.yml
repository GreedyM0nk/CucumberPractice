name: Retail Automation CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    
    # Explicitly opt into Node.js 24 to avoid deprecation issues
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # FIX 0: Install Google Chrome for Selenium tests
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # Install Allure CLI for report generation
      - name: Install Allure CLI
        run: |
          curl -o allure-2.27.0.tgz -OLs https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          sudo tar -zxvf allure-2.27.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.27.0/bin/allure /usr/bin/allure
          allure --version

      # Run all test suites
      - name: Run All Tests
        run: mvn clean test -Denv=uat
        continue-on-error: true

      - name: Check Allure Results
        if: always()
        run: |
          echo "=== Allure Results Check ==="
          RESULT_COUNT=$(find target/allure-results -name "*.json" 2>/dev/null | wc -l)
          echo "Found $RESULT_COUNT Allure result files"
          ls -la target/allure-results/ 2>/dev/null | head -30 || echo "No allure-results directory found"

      # FIX 3: Restore previous history BEFORE generating the report (enables Trend chart)
      - name: Restore Allure History
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-history

      - name: Copy History Into Results
        if: always()
        run: |
          mkdir -p target/allure-results/history
          if [ -d "gh-pages-history/history" ]; then
            echo "Restoring previous history for trend charts..."
            cp -r gh-pages-history/history/* target/allure-results/history/ 2>/dev/null || true
            echo "History restored:"
            ls -la target/allure-results/history/
          else
            echo "No previous history found — this is likely the first run."
          fi

      # FIX 4: Generate report using Allure CLI (reliable, not Maven plugin)
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate target/allure-results --clean -o target/site/allure-report
          echo "Report generated:"
          ls -la target/site/allure-report/

      - name: Save New History to gh-pages
        if: always()
        run: |
          mkdir -p target/site/allure-report/history
          echo "History to be deployed:"
          ls -la target/site/allure-report/history/ 2>/dev/null || echo "No history directory yet"

      - name: Deploy Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/site/allure-report
          force_orphan: false
          keep_files: false

      - name: Report Summary
        if: always()
        run: |
          echo "=========================================="
          echo "  Test Execution & Report Summary"
          echo "=========================================="
          REPO_OWNER=$(echo '${{ github.repository }}' | cut -d/ -f1)
          REPO_NAME=$(echo '${{ github.repository }}' | cut -d/ -f2)
          echo "📊 Report URL: https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Timestamp: $(date)"
          echo "=========================================="