name: Retail Automation CI

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the Java environment (JDK 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Speeds up future runs by caching dependencies

      # 3. Run the Cucumber tests via Maven
      - name: Run Tests
        run: mvn clean test
        continue-on-error: true # Ensures the report is generated even if tests fail

      # 4. Generate the Allure HTML Report
      - name: Generate Allure Report
        run: mvn allure:report

      # 5. Save the report as an Artifact (Downloadable from GitHub UI)
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          retention-days: 7 # Keeps the storage clean automatically