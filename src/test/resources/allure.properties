# Allure results directory ? relative to the project working directory.
# This path is used when running tests from IntelliJ directly (right-click Run).
# When running via Maven (mvn test), Surefire also passes
#   -Dallure.results.directory=${project.build.directory}/allure-results
# which overrides this value ? so both run modes write to the same folder.
allure.results.directory=target/allure-results

