browser=chrome
# Default environment if none is specified
env=uat
# Set to true for CI/CD servers (e.g. GitHub Actions / Linux with no display).
# Enables: --headless=new, --no-sandbox, --disable-dev-shm-usage, --window-size=1920,1080
# Override from command line:  mvn test -Dheadless=true
headless=false
implicitWait=10
explicitWait=10
pageLoadTimeout=30
scriptTimeout=30