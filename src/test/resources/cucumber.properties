# Restrict Cucumber's classpath scanning to ONLY the step definitions package.
#
# Without this, when running a feature file directly in IntelliJ (right-click ? Run),
# Cucumber uses io.cucumber.core.cli.Main and scans the ENTIRE classpath for glue.
# This hits classes like:
#   - com.retail.utils.DriverFactory       ? references WebDriver (not on glue path)
#   - com.retail.utils.TestDataReader      ? references JsonObject
#   - com.retail.stepdefinitions.ApplicationHooks ? references Scenario
#   - org.apache.logging.log4j.core.jackson.* ? references JacksonException
# All produce: WARNING: Failed to load methods of class '...'
# and cause "Step undefined" because the real step definitions are never loaded.
#
# This file is read by Cucumber regardless of how tests are launched.
cucumber.glue=com.retail.stepdefinitions

# Suppress the "Share your Cucumber Report" publish banner
cucumber.publish.quiet=true

